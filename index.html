<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:url('https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/wallpaper.gif');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
min-height:100vh;
overflow-x:hidden;
transition:background .4s;
}

/* HORIZONTAL */

@media screen and (orientation:landscape){

body{
background-size:100% auto;
}

}

/* PARTÍCULAS */

.snow{
position:fixed;
width:4px;
height:4px;
background:red;
border-radius:50%;
pointer-events:none;
opacity:.5;
animation:fall linear infinite;
z-index:1;
}

@keyframes fall{

0%{
transform:translateY(-10px);
opacity:0;
}

100%{
transform:translateY(100vh);
opacity:1;
}

}

/* LOGO */

.logo{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:22px;
font-weight:900;
color:red;
text-shadow:0 0 12px red;
letter-spacing:2px;
z-index:10;
}

/* BOTÕES */

.menu-btn{
position:fixed;
left:15px;
width:52px;
height:52px;
border-radius:50%;
background:rgba(0,0,0,.80);
color:white;
border:1px solid rgba(255,255,255,.10);
font-size:20px;
z-index:1000;
transition:.2s;
backdrop-filter:blur(6px);
}

.menu-btn:hover{
background:red;
transform:scale(1.05);
}

/* MENU */

#menu{
position:fixed;
top:80px;
left:15px;
width:290px;
background:rgba(0,0,0,.88);
border-radius:22px;
padding:18px;
display:none;
z-index:999;
backdrop-filter:blur(8px);
border:1px solid rgba(255,0,0,.25);
max-height:80vh;
overflow:auto;
}

/* TITULOS */

.title{
font-size:18px;
font-weight:bold;
color:red;
margin-bottom:14px;
padding-left:5px;
margin-top:5px;
}

/* LINKS */

.link{
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,.05);
padding:13px;
border-radius:14px;
margin-top:8px;
text-decoration:none;
color:white;
font-size:14px;
transition:.2s;
}

.link:hover{
background:red;
transform:scale(1.02);
}

/* TEMAS */

#themesPanel{
position:fixed;
top:145px;
left:15px;
width:300px;
background:rgba(0,0,0,.88);
border-radius:22px;
padding:15px;
display:none;
z-index:999;
border:1px solid rgba(255,0,0,.25);
backdrop-filter:blur(8px);
max-height:75vh;
overflow:auto;
}

#themesPanel h2{
color:red;
font-size:18px;
margin-bottom:15px;
font-weight:bold;
}

.theme-card{
background:rgba(255,255,255,.03);
padding:8px;
border-radius:14px;
margin-bottom:12px;
}

.theme-card img{
width:100%;
height:110px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid transparent;
transition:.2s;
}

.theme-card img:hover{
border-color:red;
transform:scale(1.02);
}

/* BOTÃO FIXAR */

.save-mini{
width:90px;
height:32px;
margin-top:6px;
border:none;
border-radius:8px;
background:red;
color:white;
font-size:12px;
font-weight:bold;
cursor:pointer;
transition:.2s;
display:block;
}

.save-mini:hover{
opacity:.8;
}

/* RODAPÉ */

.footer{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:10;
}

.footer a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
background:rgba(0,0,0,.75);
color:white;
font-size:18px;
text-decoration:none;
transition:.2s;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(5px);
}

.footer a:hover{
background:red;
transform:scale(1.08);
}

/* SCROLL */

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:red;
border-radius:10px;
}

<script>

/* TEMA SALVO */

const savedTheme =
localStorage.getItem("troopdark_theme");

if(savedTheme){

document.body.style.backgroundImage =
`url('${savedTheme}')`;

}

/* MENU */

function toggleMenu(){

const menu =
document.getElementById("menu");

const themes =
document.getElementById("themesPanel");

const themeBtn =
document.getElementById("themeButton");

if(menu.style.display === "block"){

menu.style.display = "none";

themeBtn.style.display = "block";

}else{

menu.style.display = "block";

themes.style.display = "none";

themeBtn.style.display = "none";

}

}

/* TEMAS */

function toggleThemes(){

const menu =
document.getElementById("menu");

const panel =
document.getElementById("themesPanel");

const menuBtn =
document.getElementById("menuButton");

if(panel.style.display === "block"){

panel.style.display = "none";

menuBtn.style.display = "block";

}else{

panel.style.display = "block";

menu.style.display = "none";

menuBtn.style.display = "none";

}

}

/* TROCAR FUNDO */

function changeTheme(url){

document.body.style.backgroundImage =
`url('${url}')`;

}

/* FIXAR FUNDO */

function saveTheme(url){

localStorage.setItem(
"troopdark_theme",
url
);

alert("Tema fixado.");

}

/* PARTÍCULAS */

const snow =
document.getElementById("snow");

for(let i=0;i<70;i++){

const s =
document.createElement("div");

s.className = "snow";

s.style.left =
Math.random()*100+"%";

s.style.animationDuration =
(5+Math.random()*5)+"s";

s.style.animationDelay =
Math.random()*5+"s";

snow.appendChild(s);

}

</script>
